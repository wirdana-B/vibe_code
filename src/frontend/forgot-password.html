<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lupa Password - Sistem Monitoring Robot</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="forgot-password.css">
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="logo-container">
                <img src="https://www.polibatam.ac.id/wp-content/uploads/2024/01/cropped-cropped-01_Logo_1_Utama_Polibatam_Vertikal@2x.png" alt="Logo Polibatam">
            </div>
            
            <h1 class="login-title">Lupa Password</h1>
            <p class="login-subtitle">Masukkan email Anda yang terdaftar. Kami akan mengirimkan tautan untuk mereset password.</p>
            
            <form id="forgot-password-form">
                <div class="form-group">
                    <div class="input-wrapper">
                        <i class="fa-solid fa-envelope input-icon"></i>
                        <input type="email" id="email" placeholder="contoh@email.com" required>
                    </div>
                    <div class="error-message" id="email-error"></div>
                </div>
                
                <button type="submit" class="login-button">Kirim Tautan Reset</button>
            </form>
            
            <div class="footer-text">
                Kembali ke <a href="/login">Login</a>
            </div>
        </div>
    </div>

    <script>
        const form = document.querySelector('#forgot-password-form');
        const emailError = document.querySelector('#email-error');
        const emailField = document.querySelector('#email');
        const submitBtn = document.querySelector('.login-button');

        form.addEventListener('submit', async function (e) {
            e.preventDefault();
            const emailVal = emailField.value.trim();

            if (!emailVal) {
                showError('Email tidak boleh kosong.');
                return;
            }

            try {
                submitBtn.textContent = 'Memeriksa...';
                submitBtn.disabled = true;

                const response = await fetch('/api/forgot-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: emailVal })
                });
                
                const result = await response.json();
                
                if (!response.ok || !result.success) {
                    showError(result.message || 'Gagal memeriksa email.');
                    submitBtn.textContent = 'Kirim Tautan Reset';
                    submitBtn.disabled = false;
                } else {
                    // Berhasil, arahkan ke halaman reset password
                    window.location.href = `/reset-password?email=${encodeURIComponent(emailVal)}`;
                }
            } catch (err) {
                showError('Terjadi kesalahan jaringan.');
                submitBtn.textContent = 'Kirim Tautan Reset';
                submitBtn.disabled = false;
            }
        });

        function showError(msg) {
            emailError.textContent = '* ' + msg;
            emailError.style.display = 'block';
            emailField.parentElement.classList.add('error');
        }

        emailField.addEventListener('input', function() {
            emailError.style.display = 'none';
            emailField.parentElement.classList.remove('error');
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - Sistem Monitoring Robot</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="reset-password.css">
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="logo-container">
                <img src="https://www.polibatam.ac.id/wp-content/uploads/2024/01/cropped-cropped-01_Logo_1_Utama_Polibatam_Vertikal@2x.png" alt="Logo Polibatam">
            </div>
            
            <h1 class="login-title">Reset Password</h1>
            <p class="login-subtitle">Silakan masukkan password baru Anda.</p>
            
            <form id="reset-password-form">
                <div class="form-group">
                    <div class="input-wrapper">
                        <i class="fa-solid fa-lock input-icon"></i>
                        <input type="password" id="password" placeholder="Password Baru" required>
                        <i class="fa-solid fa-eye-slash toggle-password" id="toggle-password-1" title="Lihat/Sembunyikan Password"></i>
                    </div>
                </div>
                
                <div class="form-group">
                    <div class="input-wrapper">
                        <i class="fa-solid fa-lock input-icon"></i>
                        <input type="password" id="confirm-password" placeholder="Konfirmasi Password Baru" required>
                        <i class="fa-solid fa-eye-slash toggle-password" id="toggle-password-2" title="Lihat/Sembunyikan Password"></i>
                    </div>
                    <div class="error-message" id="reset-error"></div>
                </div>
                
                <button type="submit" class="login-button">Reset Password</button>
            </form>
            
            <div class="footer-text">
                Kembali ke <a href="/login">Login</a>
            </div>
        </div>
    </div>

    <script>
        // Toggle password visibility
        const togglePasswords = document.querySelectorAll('.toggle-password');
        togglePasswords.forEach(icon => {
            icon.addEventListener('click', function () {
                const input = this.previousElementSibling;
                const type = input.getAttribute('type') === 'password' ? 'text' : 'password';
                input.setAttribute('type', type);
                this.classList.toggle('fa-eye');
                this.classList.toggle('fa-eye-slash');
            });
        });

        const form = document.querySelector('#reset-password-form');
        const resetError = document.querySelector('#reset-error');
        const passField = document.querySelector('#password');
        const confPassField = document.querySelector('#confirm-password');
        const submitBtn = document.querySelector('.login-button');

        // Extract email from URL params
        const urlParams = new URLSearchParams(window.location.search);
        const emailVal = urlParams.get('email');

        if (!emailVal) {
            showError('Email tidak ditemukan. Silakan ulangi proses lupa password.');
            passField.disabled = true;
            confPassField.disabled = true;
            submitBtn.disabled = true;
        }

        form.addEventListener('submit', async function (e) {
            e.preventDefault();
            
            const passVal = passField.value;
            const confPassVal = confPassField.value;

            if (passVal.trim() === '' || confPassVal.trim() === '') {
                showError('Password tidak boleh kosong.');
                return;
            }

            if (passVal !== confPassVal) {
                showError('Password dan konfirmasi tidak cocok.');
                return;
            }

            try {
                submitBtn.textContent = 'Memproses...';
                submitBtn.disabled = true;

                const response = await fetch('/api/reset-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: emailVal, password: passVal })
                });
                
                const result = await response.json();
                
                if (!response.ok || !result.success) {
                    showError(result.message || 'Gagal mereset password.');
                    submitBtn.textContent = 'Reset Password';
                    submitBtn.disabled = false;
                } else {
                    alert('Password berhasil direset! Silakan login dengan password baru Anda.');
                    window.location.href = '/login';
                }
            } catch (err) {
                showError('Terjadi kesalahan jaringan.');
                submitBtn.textContent = 'Reset Password';
                submitBtn.disabled = false;
            }
        });

        function showError(msg) {
            resetError.textContent = '* ' + msg;
            resetError.style.display = 'block';
            confPassField.parentElement.classList.add('error');
        }

        passField.addEventListener('input', hideError);
        confPassField.addEventListener('input', hideError);

        function hideError() {
            resetError.style.display = 'none';
            confPassField.parentElement.classList.remove('error');
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar Akun - Sistem Monitoring Robot</title>
    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS (same as login) -->
    <link rel="stylesheet" href="register.css">
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <!-- Logo Section -->
            <div class="logo-container">
                <img src="https://www.polibatam.ac.id/wp-content/uploads/2024/01/cropped-cropped-01_Logo_1_Utama_Polibatam_Vertikal@2x.png" alt="Logo Polibatam">
            </div>
            
            <!-- Header Section -->
            <h1 class="login-title">Daftar Akun Baru</h1>
            <p class="login-subtitle">Silakan isi formulir di bawah ini untuk membuat akun Sistem Monitoring Robot.</p>
            
            <!-- Form Section -->
            <form id="register-form">
                <!-- Name Field -->
                <div class="form-group">
                    <div class="input-wrapper">
                        <i class="fa-solid fa-user input-icon"></i>
                        <input type="text" id="nama" placeholder="Nama Lengkap" required>
                    </div>
                </div>

                <!-- Email Field -->
                <div class="form-group">
                    <div class="input-wrapper">
                        <i class="fa-solid fa-envelope input-icon"></i>
                        <input type="email" id="email" placeholder="Email Anda" required>
                    </div>
                </div>
                
                <!-- Password Field -->
                <div class="form-group">
                    <div class="input-wrapper">
                        <i class="fa-solid fa-lock input-icon"></i>
                        <input type="password" id="password" placeholder="Buat password Anda" required>
                        <i class="fa-solid fa-eye-slash toggle-password" id="toggle-password" title="Lihat/Sembunyikan Password"></i>
                    </div>
                </div>

                <!-- Confirm Password Field -->
                <div class="form-group">
                    <div class="input-wrapper">
                        <i class="fa-solid fa-lock input-icon"></i>
                        <input type="password" id="confirm-password" placeholder="Konfirmasi password Anda" required>
                        <i class="fa-solid fa-eye-slash toggle-password" id="toggle-confirm-password" title="Lihat/Sembunyikan Password"></i>
                    </div>
                    <!-- Static Validation Message -->
                    <div class="error-message" id="register-error"></div>
                </div>
                
                <!-- Submit Button -->
                <button type="submit" class="login-button">Daftar</button>
            </form>
            
            <!-- Footer Section -->
            <div class="footer-text">
                Sudah punya akun? <a href="/login">Masuk di sini</a>
            </div>
        </div>
    </div>

    <!-- Client-side Logic -->
    <script>
        // Toggle password visibility functionality
        const setupPasswordToggle = (toggleId, inputId) => {
            const toggle = document.querySelector(toggleId);
            const input = document.querySelector(inputId);
            toggle.addEventListener('click', function () {
                const type = input.getAttribute('type') === 'password' ? 'text' : 'password';
                input.setAttribute('type', type);
                this.classList.toggle('fa-eye');
                this.classList.toggle('fa-eye-slash');
            });
        };

        setupPasswordToggle('#toggle-password', '#password');
        setupPasswordToggle('#toggle-confirm-password', '#confirm-password');

        // Form Submit
        const form = document.querySelector('#register-form');
        const errorMsg = document.querySelector('#register-error');
        const confirmField = document.querySelector('#confirm-password');

        const showError = (msg) => {
            errorMsg.textContent = '* ' + msg;
            errorMsg.style.display = 'block';
            confirmField.parentElement.classList.add('error');
        };

        const clearError = () => {
            errorMsg.style.display = 'none';
            confirmField.parentElement.classList.remove('error');
        };

        form.addEventListener('submit', async function (e) {
            e.preventDefault();
            
            const nama = document.querySelector('#nama').value.trim();
            const email = document.querySelector('#email').value.trim();
            const password = document.querySelector('#password').value;
            const confirmPassword = confirmField.value;

            if (password !== confirmPassword) {
                showError('Password dan Konfirmasi Password tidak cocok.');
                return;
            }

            try {
                const response = await fetch('/api/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ nama, email, password, konfirmasi_password: confirmPassword })
                });
                
                const result = await response.json();
                
                if (!response.ok || !result.success) {
                    showError(result.message || 'Pendaftaran gagal.');
                } else {
                    clearError();
                    alert('Pendaftaran berhasil! Silakan login.');
                    window.location.href = '/login';
                }
            } catch (err) {
                showError('Terjadi kesalahan koneksi.');
            }
        });
        
        // Hide error when user types
        confirmField.addEventListener('input', clearError);
    </script>
</body>
</html>
